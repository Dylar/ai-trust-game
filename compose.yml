services:
  main-service:
    build:
      context: .
      dockerfile: ./infrastructure/docker/go-service.Dockerfile
      args:
        SERVICE: main-service
    image: main-service:local
    environment:
      APP_ENV: ${APP_ENV:-dev}
      PORT: 8080
      LLM_PROVIDER: ${LLM_PROVIDER:-static}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

  frontend-web:
    build:
      context: .
      dockerfile: ./infrastructure/docker/flutter-web.Dockerfile
      args:
        APP_ENV: ${APP_ENV:-dev}
        API_BASE_URL: ${API_BASE_URL:-http://localhost:8080}
    image: frontend-web:local
    depends_on:
      main-service:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
