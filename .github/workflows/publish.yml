name: Publish Images

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      image-tag:
        description: "Optional extra image tag, for example manual-deploy-2026-05-02-11-21"
        required: false
        type: string
        default: ""

jobs:
  go-checks:
    uses: ./.github/workflows/reusable-go.yml

  flutter-checks:
    uses: ./.github/workflows/reusable-flutter.yml
    with:
      flutter-version: "3.41.2"

  helm-checks:
    uses: ./.github/workflows/reusable-helm.yml
    with:
      chart-path: ./infrastructure/k8s/helm/http-service
      values-files: |
        ./services/main-service/k8s/values-dev.yaml
        ./services/main-service/k8s/values-test.yaml
        ./services/main-service/k8s/values-prod.yaml

  docker-build-main-service:
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      job-name: Docker Build Main Service
      dockerfile: ./infrastructure/docker/go-service.Dockerfile
      build-args: |
        SERVICE=main-service

  docker-build-frontend-web:
    uses: ./.github/workflows/reusable-docker-build.yml
    with:
      job-name: Docker Build Frontend Web
      dockerfile: ./infrastructure/docker/flutter-web.Dockerfile
      build-args: |
        APP_ENV=dev
        API_BASE_URL=http://localhost:8080

  publish-main-service:
    needs:
      - go-checks
      - flutter-checks
      - helm-checks
      - docker-build-main-service
      - docker-build-frontend-web
    uses: ./.github/workflows/reusable-docker-publish.yml
    secrets: inherit
    with:
      job-name: Publish Main Service To GHCR
      image-name: ai-trust-game-main-service
      dockerfile: ./infrastructure/docker/go-service.Dockerfile
      extra-tags: ${{ github.event.inputs.image-tag || '' }}
      build-args: |
        SERVICE=main-service

  publish-frontend-web:
    needs:
      - go-checks
      - flutter-checks
      - helm-checks
      - docker-build-main-service
      - docker-build-frontend-web
    uses: ./.github/workflows/reusable-docker-publish.yml
    secrets: inherit
    with:
      job-name: Publish Frontend Web To GHCR
      image-name: ai-trust-game-frontend-web
      dockerfile: ./infrastructure/docker/flutter-web.Dockerfile
      extra-tags: ${{ github.event.inputs.image-tag || '' }}
      build-args: |
        APP_ENV=prod
        API_BASE_URL=https://api.example.com
