name: Reusable Helm Checks

on:
  workflow_call:
    inputs:
      chart-path:
        required: true
        type: string
      values-files:
        required: true
        type: string
      helm-version:
        required: false
        type: string
        default: "v4.1.4"

jobs:
  helm-checks:
    name: Helm Lint And Template
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: ${{ inputs.helm-version }}

      - name: Lint and render chart values
        shell: bash
        env:
          VALUES_FILES: ${{ inputs.values-files }}
        run: |
          while IFS= read -r values_file; do
            values_file="$(echo "$values_file" | xargs)"
            if [ -z "$values_file" ]; then
              continue
            fi

            echo "Linting $values_file"
            helm lint "${{ inputs.chart-path }}" -f "$values_file"

            echo "Rendering $values_file"
            helm template "$(basename "$values_file" .yaml)" "${{ inputs.chart-path }}" -f "$values_file" >/dev/null
          done <<< "$VALUES_FILES"
