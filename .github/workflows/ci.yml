name: CI

env:
  FLUTTER_VERSION: 3.41.2

on:
  pull_request:
    branches:
      - test
  push:
    branches:
      - master

jobs:
  go-test:
    name: Go Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run Go tests
        run: go test ./...

  go-lint:
    name: Go Lint
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8
          args: ./...

  flutter-checks:
    name: Flutter Analyze And Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

  docker-build-main-service:
    name: Docker Build Main Service
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build main-service image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infrastructure/docker/go-service.Dockerfile
          build-args: |
            SERVICE=main-service
          push: false
          load: false

  docker-build-frontend-web:
    name: Docker Build Frontend Web
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend-web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./infrastructure/docker/flutter-web.Dockerfile
          build-args: |
            APP_ENV=dev
            API_BASE_URL=http://localhost:8080
          push: false
          load: false
