serviceName: main-service
namespace: ai-trust-game-prod
environment: prod
component: backend
partOf: ai-trust-game

replicas: 2

image:
  repository: ghcr.io/dylar/ai-trust-game-main-service
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8080
servicePort: 8080

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 512Mi

config:
  APP_ENV: prod
  PORT: "8080"
  LLM_PROVIDER: static
  GROQ_MODEL: ""
