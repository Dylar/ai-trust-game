serviceName: main-service
namespace: atg-test
environment: test
component: backend
partOf: ai-trust-game

replicas: 1

image:
  repository: ghcr.io/dylar/ai-trust-game-main-service
  tag: test
  pullPolicy: IfNotPresent

imagePullSecrets: []

containerPort: 8080
servicePort: 8080

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

config:
  APP_ENV: test
  PORT: "8080"
  LLM_PROVIDER: static
  GROQ_MODEL: ""
